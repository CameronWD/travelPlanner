<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F2674A" />
  <title>You're offline — Trip Planner</title>
  <style>
    :root {
      --primary: #F2674A;
      --bg: #FBF6EF;
      --text: #1a1a1a;
      --muted: #6b6b6b;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .hint {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 2rem;
    }

    .retry-btn {
      margin-top: 1.5rem;
      padding: 0.625rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
    }

    .retry-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="icon">✈️</div>
  <h1>You're offline</h1>
  <p>No connection right now — but cached pages still work.</p>
  <p>Navigate to a trip you've already visited to keep planning.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try again</button>
  <p class="hint">Edits need a connection — changes you make will sync when you're back online.</p>
</body>
</html>
